<h2>Course List</h2>

<!-- Loading Message -->
@if (isLoading) {

    <p class="loading">Loading courses...</p>

} @else {

    @if (courses.length > 0) {

        <div class="course-grid">

            @for (course of courses; track trackByCourseId($index, course)) {

                <app-course-card
                    [course]="course"
                    (enrollRequested)="onEnroll($event)">
                </app-course-card>

            }

        </div>

    } @else {

        <p class="no-course">
            No courses available.
        </p>

    }

}

@if (selectedCourseId !== null) {

    <div class="selected-course">

        <h3>Selected Course ID: {{ selectedCourseId }}</h3>

    </div>

}
