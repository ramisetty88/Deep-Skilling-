<h2>Course List</h2>

<p *ngIf="isLoading" class="loading">
  Loading courses...
</p>

<div *ngIf="!isLoading">

  <div *ngIf="courses.length > 0; else noCourses" class="course-grid">

    <app-course-card
      *ngFor="let course of courses; trackBy: trackByCourseId"
      [course]="course"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>

  </div>

  <ng-template #noCourses>
    <p class="no-course">No courses available.</p>
  </ng-template>

</div>

<div *ngIf="selectedCourseId !== null" class="selected-course">
  <h3>Selected Course ID: {{ selectedCourseId }}</h3>
</div>
